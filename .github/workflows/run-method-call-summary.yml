####################################################################################
# GitHub Action to run methods-distance analysis:
#
#  User provides a Java file URL
#  Workflow generates and publishes all three report formats:
#    - JSON raw report (Test.java.json)
#    - HTML report via old DSM web UI (Test.java.html from ReportCli)
#    - HTML report via new interactive UI (Test.java.html from HtmlCli)
#  All artifacts are uploaded as non-zipped for direct browser preview
####################################################################################

name: Run-Method-Call-Summary

on:
  workflow_dispatch:
    inputs:
      java-source-url:
        description: 'URL to Java source file to analyze'
        required: true
      compile:
        description: 'compile java by javac'
        type: boolean
        required: true
        default: false

concurrency:
  group: ${{ github.run_id }}
  cancel-in-progress: true

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'temurin'

      - name: Build project with Maven
        run: |
          cd methods-distance
          mvn -e --no-transfer-progress -B package

      - name: Download target Java source
        run: |
          curl --fail-with-body -X GET "${{ inputs.java-source-url }}" \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -o "Target.java"

      - name: Run methods-distance analysis
        run: |
          pwd
          ls -la
          echo "Content of Target.java:"
          cat -n "Target.java"
          echo ""
          if [[ "${{ inputs.compile }}" == "true" ]]; then
            echo "javac Target.java:"
            javac "Target.java"
          fi
          echo ""
          cd "methods-distance"
          JAR=(target/methods-distance-*-with-dependencies.jar)

          mkdir -p ../reports

          echo "Generating JSON report..."
          java -cp "${JAR[0]}" com.github.sevntu.checkstyle.JsonCli "../Target.java" "../reports"
          mv ../reports/Target.java.json ../reports/report.json

          echo "Generating interactive HTML report..."
          java -cp "${JAR[0]}" com.github.sevntu.checkstyle.HtmlCli "../Target.java" "../reports"
          mv ../reports/Target.java.html ../reports/interactive-report.html

          echo "Generating DSM HTML report..."
          java -cp "${JAR[0]}" com.github.sevntu.checkstyle.Main "../Target.java" --generate-dsm
          mv Target.java.html ../reports/dsm-report.html

          echo "Generating call graph dot file..."
          java -cp "${JAR[0]}" com.github.sevntu.checkstyle.Main "../Target.java" --generate-dot
          mv Target.java.dot ../reports/call-graph.dot

      - name: Upload JSON
        uses: actions/upload-artifact@v7
        with:
          name: method-call-summary-report-json
          path: reports/report.json
          archive: false

      - name: Upload interactive HTML
        uses: actions/upload-artifact@v7
        with:
          name: method-call-summary-report-interactive-html
          path: reports/interactive-report.html
          archive: false

      - name: Upload DSM HTML
        uses: actions/upload-artifact@v7
        with:
          name: method-call-summary-report-dsm-html
          path: reports/dsm-report.html
          archive: false

      - name: Upload dot file
        uses: actions/upload-artifact@v7
        with:
          name: method-call-summary-report-dot
          path: reports/call-graph.dot
          archive: false
